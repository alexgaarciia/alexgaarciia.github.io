<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name | Portfolio</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(120deg, #f8fafc 0%, #e0e7ff 100%);
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 40px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(60,60,120,0.08);
      text-align: center;
    }
    h1 {
      font-size: 2.8em;
      margin-bottom: 0.3em;
      color: #3b82f6;
    }
    p {
      font-size: 1.3em;
      margin-bottom: 1.5em;
    }
    .cta {
      display: inline-block;
      padding: 14px 32px;
      background: #3b82f6;
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1em;
      transition: background 0.2s;
    }
    .cta:hover {
      background: #2563eb;
    }
    .social {
      margin-top: 2em;
    }
    .social a {
      margin: 0 12px;
      color: #3b82f6;
      font-size: 1.5em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .social a:hover {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, I'm <span style="color:#2563eb;">Your Name</span></h1>
    <p>Welcome to my portfolio! I'm a passionate developer/designer who loves building creative and impactful projects. Explore my work and connect with me below.</p>
    <a href="#projects" class="cta">See My Projects</a>
    <div class="social">
      <a href="https://github.com/yourusername" title="GitHub">🐙</a>
      <a href="mailto:your@email.com" title="Email">✉️</a>
      <!-- Add more social links as needed -->
    </div>
  </div>
</body>
</html>
